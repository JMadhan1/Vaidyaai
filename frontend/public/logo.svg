<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120" fill="none">
  <defs>
    <linearGradient id="lBg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1626"/>
      <stop offset="1" stop-color="#070C17"/>
    </linearGradient>
    <radialGradient id="lBgGlow" cx="82%" cy="80%" r="50%">
      <stop offset="0%"   stop-color="#C8D8F0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0E1626" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lLine" x1="8" y1="64" x2="112" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#10B981" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#10B981"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="lNode" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="25%"  stop-color="#A7F3D0"/>
      <stop offset="70%"  stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>
    <filter id="lGlow" x="-40%" y="-200%" width="180%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lNodeHalo" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lDotGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon mark -->
  <rect x="4" y="4" width="112" height="112" rx="22" fill="url(#lBg)"/>
  <rect x="4" y="4" width="112" height="112" rx="22" fill="url(#lBgGlow)"/>

  <!-- Mini 5 arc dots -->
  <g filter="url(#lDotGlow)">
    <circle cx="42" cy="90" r="2.5" fill="#10B981" opacity="0.38"/>
    <circle cx="52" cy="95" r="3"   fill="#10B981" opacity="0.55"/>
    <circle cx="62" cy="97" r="3.5" fill="#10B981" opacity="0.70"/>
    <circle cx="72" cy="95" r="3"   fill="#10B981" opacity="0.55"/>
    <circle cx="82" cy="90" r="2.5" fill="#10B981" opacity="0.38"/>
  </g>

  <!-- Mini ECG line: left flat → QRS dip/spike → big diagonal to node → V down → right flat -->
  <path d="M 8,65 H 38 L 44,72 L 50,50 L 56,65 L 76,24 L 90,74 L 96,62 H 112"
        stroke="url(#lLine)"
        stroke-width="5.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#lGlow)"/>

  <!-- Mini node at spike peak (76, 24) -->
  <circle cx="76" cy="24" r="10" fill="#10B981" opacity="0.15" filter="url(#lNodeHalo)"/>
  <circle cx="76" cy="24" r="8"  fill="url(#lNode)" filter="url(#lNodeHalo)"/>
  <circle cx="73" cy="21" r="3"  fill="#FFFFFF" opacity="0.9"/>

  <!-- Logotype -->
  <text
    x="132" y="79"
    font-family="Nunito, 'Segoe UI', Arial, sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="-1">
    <tspan fill="#F9FAFB">Vaidya</tspan><tspan fill="#10B981">AI</tspan>
  </text>
</svg>
