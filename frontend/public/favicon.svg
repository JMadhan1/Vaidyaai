<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Optimised for 16×32px — thick strokes, no filters for crisp rendering -->
  <rect width="32" height="32" rx="6.5" fill="#0E1626"/>
  <!-- ECG spike (scaled down, simplified for pixel clarity) -->
  <path d="M 2,17 H 9 L 11,19.5 L 13,13.5 L 15,17 L 19.5,8 L 23,19.8 L 24.5,16.5 H 30"
        stroke="#10B981" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Node circle at peak -->
  <circle cx="19.5" cy="8" r="3.2" fill="#10B981"/>
  <circle cx="18.8" cy="7.3" r="1.2" fill="#FFFFFF" opacity="0.9"/>
</svg>
