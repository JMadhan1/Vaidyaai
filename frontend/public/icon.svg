<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Dark navy base background -->
    <linearGradient id="bgBase" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1626"/>
      <stop offset="1" stop-color="#070C17"/>
    </linearGradient>

    <!-- Lower-right bright ambient glow (matches the AI-generated image) -->
    <radialGradient id="bgGlow" cx="82%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#C8D8F0" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#7BA8D4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0E1626" stop-opacity="0"/>
    </radialGradient>

    <!-- ECG line: emerald with fade on ends -->
    <linearGradient id="lineGrad" x1="62" y1="272" x2="455" y2="272" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#10B981" stop-opacity="0.6"/>
      <stop offset="30%"  stop-color="#10B981"/>
      <stop offset="75%"  stop-color="#10B981"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.45"/>
    </linearGradient>

    <!-- Glowing node: white core → bright green → deep green -->
    <radialGradient id="nodeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#A7F3D0"/>
      <stop offset="70%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>

    <!-- Large halo glow for node -->
    <filter id="nodeHalo" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ECG line glow -->
    <filter id="lineGlow" x="-10%" y="-120%" width="120%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle dot glow -->
    <filter id="dotGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="100" fill="url(#bgBase)"/>
  <!-- Lower-right ambient glow overlay -->
  <rect width="512" height="512" rx="100" fill="url(#bgGlow)"/>

  <!-- ── 5 arc dots (village network, below QRS area) ── -->
  <!-- Fan opens downward, centered ~x=283, cascading y -->
  <g filter="url(#dotGlow)">
    <circle cx="228" cy="382" r="8"  fill="#10B981" opacity="0.38"/>
    <circle cx="255" cy="398" r="10" fill="#10B981" opacity="0.55"/>
    <circle cx="284" cy="405" r="12" fill="#10B981" opacity="0.72"/>
    <circle cx="313" cy="398" r="10" fill="#10B981" opacity="0.55"/>
    <circle cx="340" cy="382" r="8"  fill="#10B981" opacity="0.38"/>
  </g>

  <!-- ── ECG heartbeat line ── -->
  <!--
    Path trace (left → right):
    62,272   – left flat line start
    175,272  – end of left flat
    196,302  – small Q dip
    216,218  – small R spike up
    235,278  – S back to baseline
    308,128  – BIG diagonal up-right to AI node peak
    366,316  – down to V bottom
    390,268  – slight rise
    455,268  – right flat line end (shorter dash)
  -->
  <path d="M 62,272 H 175 L 196,302 L 216,218 L 235,278 L 308,128 L 366,316 L 390,268 H 455"
        stroke="url(#lineGrad)"
        stroke-width="20"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#lineGlow)"/>

  <!-- ── Glowing AI node at spike peak ── -->
  <!-- Outer wide halo -->
  <circle cx="308" cy="128" r="52" fill="#10B981" opacity="0.12" filter="url(#nodeHalo)"/>
  <!-- Main glowing circle -->
  <circle cx="308" cy="128" r="34" fill="url(#nodeGrad)" filter="url(#nodeHalo)"/>
  <!-- Bright white inner core (top-left offset for 3D feel) -->
  <circle cx="300" cy="120" r="13" fill="#FFFFFF" opacity="0.92"/>
</svg>
